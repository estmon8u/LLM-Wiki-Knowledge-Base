name: Tests

on:
  push:
    branches:
      - main
      - GraphRAG
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Poetry
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user "poetry==2.3.3"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
          cache-dependency-path: poetry.lock

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcairo2-dev pkg-config python3-dev

      - name: Install project dependencies
        run: |
          poetry env use python
          poetry install --with dev --all-extras --no-interaction

      - name: Check formatting with Black
        run: poetry run black --check src tests

      - name: Run Ruff lint
        run: poetry run ruff check src tests

      - name: Type-check project
        run: poetry run mypy src/graphwiki_kb

      - name: Smoke test CLI entry points
        run: |
          poetry run kb --help
          poetry run kb init --help
          poetry run kb update --help
          poetry run kb ask --help
          poetry run kb status --help

      - name: Build and smoke test installed wheel
        run: |
          poetry build
          python -m venv /tmp/kb-install-test
          /tmp/kb-install-test/bin/pip install --upgrade pip
          wheel=$(ls dist/graphwiki_kb-*.whl)
          /tmp/kb-install-test/bin/pip install "${wheel}[openai]"
          /tmp/kb-install-test/bin/kb --help
          /tmp/kb-install-test/bin/kb init --help
          /tmp/kb-install-test/bin/kb update --help
          /tmp/kb-install-test/bin/kb ask --help

      - name: Run tests with coverage
        run: poetry run pytest

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml
