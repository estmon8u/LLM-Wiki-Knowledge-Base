version: 2
name: graphrag-pivot-evaluation
description: Benchmark questions for comparing WikiGraphRAG, Microsoft GraphRAG, and the deprecated SQLite
  FTS comparator without relying on skipped answer rows.
source_project: kb-cli-realworld-pdf-20260415/project-codex-20260424-userchanges-realrun
retrievers:
  legacy_fts:
    deprecated: true
    purpose: Historical comparator and exact lexical lookup only.
    command: kb find --engine legacy / kb ask --engine legacy
  graphrag_basic:
    command: kb ask --engine graphrag --method basic
    purpose: Baseline vector-style GraphRAG query mode for direct questions.
  graphrag_local:
    command: kb ask --engine graphrag --method local
    purpose: Entity, method, or document-specific questions.
  graphrag_global:
    command: kb ask --engine graphrag --method global
    purpose: Whole-corpus themes and community-summary questions.
  graphrag_drift:
    command: kb ask --engine graphrag --method drift
    purpose: Comparison questions that need global context plus local grounding.
  wikigraph:
    command: kb ask --engine wikigraph
    purpose: Custom provider-free/provider-backed WikiGraphRAG backend built from maintained wiki artifacts
      and normalized TextUnits.
metrics:
  retrieval:
  - recall_at_5
  - multi_source_coverage
  - method_fit
  - latency_seconds
  answers:
  - claim_support_rate
  - grounded_entity_rate
  - grounded_answer_term_rate
  - citation_ref_valid_rate
  - insufficient_evidence_behavior
  - answer_quality_score
  - latency_seconds
questions:
- id: realm_vs_rag
  question: How does REALM differ from RAG?
  category: comparison
  intent: Compare related retrieval-augmented methods across source papers.
  expected_method: drift
  expected_sources:
  - REALM
  - RAG
  legacy_find_artifact: eval/legacy-fts/realm_vs_rag_find.json
  legacy_ask_artifact: eval/legacy-fts/realm_vs_rag_ask.txt
  status: legacy_find_captured
  expected_entities:
  - REALM
  - RAG
  expected_answer_terms:
  - jointly trains
  - frozen retriever
  - generation
  expected_methods:
    wikigraph: drift-lite
    graphrag: drift
- id: fid_generation
  question: How does FiD combine retrieval with generation?
  category: local
  intent: Check whether retrieval can surface generation-specific method details.
  expected_method: local
  expected_sources:
  - FiD
  - Fusion-in-Decoder
  legacy_ask_artifact: eval/legacy-fts/fid_generation.txt
  status: pending_provider_approval
  expected_entities:
  - FiD
  - Fusion-in-Decoder
  expected_answer_terms:
  - retrieved passages
  - decoder
  - generation
  expected_methods:
