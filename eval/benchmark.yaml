    graphrag: drift
notes:
- Provider-backed legacy ask captures send retrieved source snippets to the configured external model
  and require explicit user approval before running.
- GraphRAG Basic, Local, Global, and DRIFT query jobs can create provider costs through the configured
  GraphRAG runtime provider.
- scripts/evaluate_graph_modes.py defaults to local-safe checks and writes skipped rows for provider-backed
  answer modes unless --allow-provider-calls is set.
- Evaluation outputs are written to eval/results/summary.md, eval/results/retrieval_metrics.csv, eval/results/answer_metrics.csv,
  and eval/results/artifacts/.
