- id: graph_vs_legacy
  question: How does GraphRAG retrieval differ from the deprecated legacy FTS path?
  category: comparison
  intent: Evaluate the pivot narrative and demotion of lexical retrieval.
  expected_method: drift
  expected_sources:
  - GraphRAG
  - legacy
  - FTS
  expected_entities:
