repos:
  - repo: https://github.com/psf/black
    rev: 25.12.0
    hooks:
      - id: black
        args: ["src", "tests"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: ["src", "tests"]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.0
    hooks:
      - id: mypy
        args:
          - "src/graphwiki_kb/providers"
          - "src/graphwiki_kb/services/graphrag_command_service.py"
          - "src/graphwiki_kb/services/graphrag_runtime.py"
          - "src/graphwiki_kb/services/graphrag_status_service.py"
          - "src/graphwiki_kb/services/query_router_service.py"
        additional_dependencies:
          - "types-PyYAML"
